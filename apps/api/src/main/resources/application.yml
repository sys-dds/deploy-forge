spring:
  application:
    name: deploy-forge-api
  datasource:
    url: ${DEPLOYFORGE_DB_URL:jdbc:postgresql://localhost:5432/deployforge}
    username: ${DEPLOYFORGE_DB_USER:deployforge}
    password: ${DEPLOYFORGE_DB_PASSWORD:deployforge}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

deployforge:
  node:
    node-id: ${DEPLOYFORGE_NODE_ID:local-node-1}
