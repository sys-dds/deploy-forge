name: DeployForge Backend Platform Hardening

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-platform-hardening:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run targeted backend tests
        working-directory: apps/api
        run: |
          chmod +x ./mvnw
          ./mvnw "-Dtest=*IntegrationTest,*IntegrationTests" test

      - name: Compile backend
        working-directory: apps/api
        run: ./mvnw -DskipTests compile

      - name: Validate Docker Compose config
        run: docker compose -f infra/docker-compose/docker-compose.yml config
