name: DeployForge Backend Platform Hardening

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-platform-hardening:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run targeted backend tests
        working-directory: apps/api
        run: |
          chmod +x ./mvnw
          ./mvnw "-Dtest=FoundationIntegrationTest,SystemControllerIntegrationTest,FoundationMigrationIntegrationTest,DomainFoundationIntegrationTest,FoundationValidationIntegrationTest,FoundationMetadataIntegrationTest,ReleaseArtifactMigrationIntegrationTest,ReleaseArtifactRegistryIntegrationTest,ReleaseArtifactImmutabilityIntegrationTest,ReleaseArtifactEvidenceIntegrationTest,ArtifactDeployabilityIntegrationTest,DeploymentPlanMigrationIntegrationTest,DeploymentPlanIntegrationTest,DeploymentPlanIdempotencyIntegrationTest,DeploymentPlanRiskCalculationIntegrationTest,DeploymentPlanEvidenceSnapshotIntegrationTest,DeploymentPlanLifecycleIntegrationTest,EnvironmentCurrentStateIntegrationTest,DeploymentIntentEventLogIntegrationTest,Deploy002To017FunctionalIntegrationTest,Deploy018To040FunctionalIntegrationTest,ApprovalLifecycleRegressionIntegrationTest,DeploymentLockRegressionIntegrationTest,GateExecutionRegressionIntegrationTest,DeploymentReadinessRegressionIntegrationTest,GovernanceEventConsistencyIntegrationTest,RolloutWaveModelIntegrationTest,RolloutStartIntegrationTest,RolloutPreflightReadinessIntegrationTest,WaveGateEvidenceIntegrationTest,CanaryWaveAdvanceIntegrationTest,RolloutPauseIntegrationTest,RolloutResumeIntegrationTest,RolloutAbortIntegrationTest,CanaryFailureBehaviorIntegrationTest,RollbackRecommendationIntegrationTest,RolloutEvidenceApiIntegrationTest,RolloutIdempotencyIntegrationTest,Deploy041To056FunctionalIntegrationTest,Pr7CarryForwardHardeningIntegrationTest,RolloutTransactionBoundaryIntegrationTest,ActiveRolloutDatabaseGuardIntegrationTest,RolloutFailureRecommendationIdempotencyIntegrationTest,TransactionalRolloutLifecycleIntegrationTest,EnvironmentStateTransitionIntegrationTest,PreviousStableArtifactIntegrationTest,RollbackExecutionMigrationIntegrationTest,RollbackStartIntegrationTest,RollbackGateIntegrationTest,RollbackSuccessLifecycleIntegrationTest,RollbackFailureLifecycleIntegrationTest,RollbackIdempotencyIntegrationTest,FailedRolloutRecoveryApiIntegrationTest,PartialRolloutRecoveryIntegrationTest,ManualInterventionRequiredIntegrationTest,RollbackEvidenceApiIntegrationTest,DeploymentConsistencyVerifierIntegrationTest,EnvironmentStateConsistencyVerifierIntegrationTest,LockRolloutRollbackConsistencyIntegrationTest,RecoveryTimelineIntegrationTest,RollbackRetryIntegrationTest,ForceManualInterventionIntegrationTest,Deploy057To080RollbackRecoveryIntegrationTest,Deploy057To080FailureAndRetryFunctionalIntegrationTest,RollbackCommandIdempotencyRegressionIntegrationTest,RollbackGateRequirementRegressionIntegrationTest,RollbackRetryRegressionIntegrationTest,ManualInterventionRegressionIntegrationTest,RollbackEvidenceRegressionIntegrationTest,RecoveryTimelineRegressionIntegrationTest,VerifierDepthHardeningIntegrationTest,DesiredEnvironmentStateIntegrationTest,RuntimeTargetRegistryIntegrationTest,RuntimeTargetHeartbeatIntegrationTest,RuntimeDeploymentReportIntegrationTest,RuntimeConfigReportIntegrationTest,DriftDetectorCoreIntegrationTest,ArtifactDriftDetectionIntegrationTest,ConfigDriftDetectionIntegrationTest,MissingDeploymentDriftIntegrationTest,ManualOutOfBandChangeIntegrationTest,DriftSeverityCalculatorIntegrationTest,DriftHistoryIntegrationTest,DriftAcknowledgementIntegrationTest,DriftResolutionIntegrationTest,DriftRepairRecommendationIntegrationTest,DriftRepairIntentIntegrationTest,DriftEvidenceApiIntegrationTest,DriftAwareReadinessIntegrationTest,DriftAwareConsistencyVerifierIntegrationTest,RollbackDriftInteractionIntegrationTest,RuntimeReportFreshnessIntegrationTest,EnvironmentActualStateSummaryIntegrationTest,ManualChangeAcknowledgementIntegrationTest,AcceptActualAsDesiredIntegrationTest,RecommendRedeployDesiredIntegrationTest,DriftFailureMatrixIntegrationTest,Deploy081To112DriftFunctionalIntegrationTest" test

      - name: Compile backend
        working-directory: apps/api
        run: ./mvnw -DskipTests compile

      - name: Validate Docker Compose config
        run: docker compose -f infra/docker-compose/docker-compose.yml config
